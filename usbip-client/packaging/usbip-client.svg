<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1E293B"/>
      <stop offset="100%" stop-color="#0F172A"/>
    </linearGradient>
    <linearGradient id="usbGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#5EEAD4"/>
      <stop offset="100%" stop-color="#14B8A6"/>
    </linearGradient>
    <linearGradient id="netGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#A5B4FC"/>
      <stop offset="100%" stop-color="#6366F1"/>
    </linearGradient>
  </defs>

  <!-- 圆角方形背景 -->
  <rect width="256" height="256" rx="48" fill="url(#bgGrad)"/>

  <!-- 互联网弧线（底部，代表网络） -->
  <g stroke="url(#netGrad)" stroke-width="10" stroke-linecap="round" fill="none" opacity="0.9">
    <path d="M70 190 Q100 160 128 160 Q156 160 186 190"/>
    <path d="M52 174 Q90 130 128 130 Q166 130 204 174"/>
    <path d="M38 158 Q83 100 128 100 Q173 100 218 158"/>
  </g>

  <!-- USB 插头（主体，占据中央大部分） -->
  <g filter="drop-shadow(0 8px 12px rgba(0,0,0,0.3))">
    <!-- 插头外壳 -->
    <rect x="80" y="52" width="96" height="72" rx="16" fill="url(#usbGrad)"/>
    <!-- USB 内部标识：开口槽 -->
    <rect x="96" y="68" width="64" height="40" rx="8" fill="#0F172A"/>
    <!-- 金属触片 -->
    <rect x="112" y="44" width="32" height="14" rx="6" fill="#CBD5E1"/>
    <!-- 插头两翼（更真实的USB-A形状） -->
    <rect x="72" y="60" width="16" height="56" rx="4" fill="url(#usbGrad)"/>
    <rect x="168" y="60" width="16" height="56" rx="4" fill="url(#usbGrad)"/>
    <!-- 高光 -->
    <rect x="84" y="56" width="88" height="8" rx="4" fill="#FFFFFF" opacity="0.15"/>
  </g>

  <!-- 小型网络节点装饰（强化“互联网”概念） -->
  <circle cx="196" cy="48" r="6" fill="#A5B4FC" opacity="0.8"/>
  <circle cx="60" cy="48" r="6" fill="#A5B4FC" opacity="0.8"/>
  <circle cx="196" cy="208" r="6" fill="#A5B4FC" opacity="0.8"/>
  <circle cx="60" cy="208" r="6" fill="#A5B4FC" opacity="0.8"/>

  <!-- 连接虚线（表示数据流动） -->
  <g stroke="#818CF8" stroke-width="3" stroke-dasharray="6 6" opacity="0.6">
    <line x1="66" y1="48" x2="96" y2="52"/>
    <line x1="190" y1="48" x2="160" y2="52"/>
    <line x1="66" y1="208" x2="100" y2="124"/>
    <line x1="190" y1="208" x2="156" y2="124"/>
  </g>
</svg>
